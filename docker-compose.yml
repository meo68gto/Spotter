version: '3.8'

services:
  postgres:
    image: postgres:17-alpine
    container_name: spotter-postgres
    environment:
      POSTGRES_USER: spotter
      POSTGRES_PASSWORD: spotter_dev
      POSTGRES_DB: spotter
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spotter -d spotter"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
