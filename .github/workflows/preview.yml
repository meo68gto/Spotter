name: Preview Deployment

on:
  pull_request:
    branches: [main]

jobs:
  preview:
    runs-on: ubuntu-latest
    environment: preview
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Deploy to Vercel (Preview)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./apps/web
          vercel-args: '--prebuilt'
        id: vercel

      - name: Comment PR with preview URL
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const previewUrl = '${{ steps.vercel.outputs.preview-url }}';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Preview Deployment\n\n**Preview URL:** ${previewUrl}\n\nRun smoke tests against this URL before merging.`
            });

      - name: Run smoke tests
        if: steps.vercel.outputs.preview-url
        run: |
          PREVIEW_URL="${{ steps.vercel.outputs.preview-url }}"
          sleep 5
          # Basic smoke tests
          curl -sf "$PREVIEW_URL" > /dev/null && echo "✅ Web app is up"
          curl -sf "$PREVIEW_URL/api/health" > /dev/null && echo "✅ Health endpoint is up"
        continue-on-error: true
