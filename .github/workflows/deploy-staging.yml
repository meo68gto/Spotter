name: Deploy Staging

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Release preflight
        run: pnpm release:preflight
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          POSTHOG_PROJECT_API_KEY: ${{ secrets.POSTHOG_PROJECT_API_KEY }}
          POSTHOG_HOST: ${{ secrets.POSTHOG_HOST }}
          SENTRY_DSN_FUNCTIONS: ${{ secrets.SENTRY_DSN_FUNCTIONS }}
          SENTRY_DSN_MOBILE: ${{ secrets.SENTRY_DSN_MOBILE }}
          ADMIN_DELETION_TOKEN: ${{ secrets.ADMIN_DELETION_TOKEN }}
          FLAG_ENVIRONMENT: staging

      - name: Migration validation
        run: pnpm db:check

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        working-directory: apps/functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push DB migrations
        run: supabase db push --include-all
        working-directory: apps/functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy Edge Functions
        run: |
          supabase functions deploy health
          supabase functions deploy onboarding-profile
          supabase functions deploy matching-candidates
          supabase functions deploy matching-request
          supabase functions deploy matching-accept
          supabase functions deploy matching-reject
          supabase functions deploy sessions-propose
          supabase functions deploy sessions-confirm
          supabase functions deploy sessions-cancel
          supabase functions deploy sessions-feedback
          supabase functions deploy chat-send
          supabase functions deploy videos-presign
          supabase functions deploy videos-analysis
          supabase functions deploy videos-enqueue-processing
          supabase functions deploy videos-process-next
          supabase functions deploy progress-generate
          supabase functions deploy progress-snapshots
          supabase functions deploy admin-process-deletion
          supabase functions deploy legal-status
          supabase functions deploy legal-consent
          supabase functions deploy payments-connect-onboard
          supabase functions deploy payments-review-order-create
          supabase functions deploy payments-review-order-confirm
          supabase functions deploy payments-refund-request
          supabase functions deploy payments-webhook
        working-directory: apps/functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Build mobile bundle (staging artifact)
        run: pnpm --filter @spotter/mobile build
