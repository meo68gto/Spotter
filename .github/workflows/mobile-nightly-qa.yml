name: Mobile Nightly QA

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Lighthouse
        run: pnpm mobile:web:lighthouse

      - name: Upload Lighthouse artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-${{ github.run_id }}
          path: .artifacts/qa/lighthouse/**
          if-no-files-found: warn

  detox-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install applesimutils
        run: |
          brew tap wix/brew
          brew install applesimutils

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Detox iOS
        run: pnpm mobile:e2e:build:ios

      - name: Run Detox iOS smoke suite
        run: pnpm mobile:e2e:test:ios

      - name: Upload Detox artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detox-ios-${{ github.run_id }}
          path: |
            apps/mobile/artifacts/**
            apps/mobile/e2e/artifacts/**
          if-no-files-found: warn
